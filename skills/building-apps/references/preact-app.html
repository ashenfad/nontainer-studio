<!doctype html>
<!-- Known-good no-build Preact pattern: ES modules from esm.sh.
     Copy this shape exactly — no UMD <script src> builds, no global
     variable guessing (there is no `preact` or `preactHooks` global
     in this pattern; everything is imported). -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div id="app"></div>
  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10';
    import { useState, useEffect } from 'https://esm.sh/preact@10/hooks';
    import htm from 'https://esm.sh/htm';
    const html = htm.bind(h);

    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('api/summary')                     // RELATIVE url, always
          .then(async (r) => {
            const body = await r.json();         // errors are JSON too
            if (!r.ok) throw new Error(body.error);
            setData(body);
          })
          .catch((e) => setError(String(e)));
      }, []);

      if (error) return html`<div class="p-4 text-red-600">${error}</div>`;
      if (!data) return html`<div class="p-4">loading…</div>`;
      return html`
        <main class="p-4">
          <h1 class="text-2xl font-bold">Summary</h1>
          <p class="text-lg">${data.count.toLocaleString()} rows</p>
        </main>`;
    }

    render(h(App), document.getElementById('app'));
  </script>
</body>
</html>
