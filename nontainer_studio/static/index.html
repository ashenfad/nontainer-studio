<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>nontainer-studio</title>
  <style>
    :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 0.5rem 1rem; border-bottom: 1px solid color-mix(in srgb, currentColor 20%, transparent);
             display: flex; gap: 0.75rem; align-items: baseline; }
    header h1 { font-size: 1rem; margin: 0; }
    header .session { opacity: 0.7; font-size: 0.85rem; }
    #app { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    main { display: flex; flex: 1; min-height: 0; }
    .rail { width: 11rem; flex: none; display: flex; flex-direction: column; gap: 0.2rem;
            padding: 0.6rem 0.4rem; border-right: 1px solid color-mix(in srgb, currentColor 20%, transparent);
            overflow-y: auto; }
    .rail-title { font-size: 0.75rem; text-transform: uppercase; opacity: 0.55; padding: 0 0.4rem 0.3rem; }
    .rail-item { display: flex; align-items: center; gap: 0.45rem; text-align: left;
                 border: 0; background: none; padding: 0.35rem 0.5rem; border-radius: 0.4rem; }
    .rail-item.active { background: color-mix(in srgb, currentColor 12%, transparent); }
    .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%;
           background: color-mix(in srgb, currentColor 25%, transparent); flex: none; }
    .dot.busy { background: #2ecc71; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: 0.35; } }
    .rail-new input { width: 100%; font: inherit; font-size: 0.85rem; padding: 0.3rem 0.4rem;
                      border-radius: 0.4rem; box-sizing: border-box; }
    .tabs { display: flex; gap: 0.4rem; padding: 0.4rem 0.75rem;
            border-bottom: 1px solid color-mix(in srgb, currentColor 20%, transparent); }
    .tabs button.active { background: color-mix(in srgb, currentColor 15%, transparent); }
    .preview { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .history { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex;
               flex-direction: column; gap: 0.35rem; font-size: 0.85rem; }
    .history .hint { opacity: 0.6; font-size: 0.78rem; padding-bottom: 0.4rem; }
    .commit { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.4rem;
              border-radius: 0.4rem; }
    .commit.head { background: color-mix(in srgb, currentColor 10%, transparent); }
    .commit .grow, .side-bar .grow { flex: 1; }
    .notice { font-size: 0.8rem; opacity: 0.65; font-style: italic; }
    .shot { max-width: min(26rem, 90%); border-radius: 0.5rem;
            border: 1px solid color-mix(in srgb, currentColor 20%, transparent); }
    .files { flex: 1; display: flex; min-height: 0; font-size: 0.82rem; }
    .file-list { width: 15rem; flex: none; overflow-y: auto; padding: 0.5rem;
                 border-right: 1px solid color-mix(in srgb, currentColor 20%, transparent);
                 display: flex; flex-direction: column; gap: 0.1rem; }
    .file-item { text-align: left; border: 0; background: none; padding: 0.25rem 0.4rem;
                 border-radius: 0.3rem; font-family: ui-monospace, monospace; font-size: 0.75rem;
                 overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item.active { background: color-mix(in srgb, currentColor 12%, transparent); }
    .file-view { flex: 1; overflow: auto; padding: 0.75rem; }
    .file-view pre { margin: 0; font-size: 0.75rem; white-space: pre-wrap;
                     overflow-wrap: break-word; }
    .file-view .hint { opacity: 0.5; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0.4rem 1rem 0; }
    .chip { font-size: 0.75rem; font-family: ui-monospace, monospace;
            background: color-mix(in srgb, currentColor 10%, transparent);
            border-radius: 1rem; padding: 0.15rem 0.6rem; display: inline-flex;
            align-items: center; gap: 0.3rem; }
    .chip button { border: 0; background: none; padding: 0; cursor: pointer; opacity: 0.6; }
    .attach { display: flex; align-items: center; justify-content: center;
              width: 2.2rem; border-radius: 0.5rem; cursor: pointer; font-size: 1.2rem;
              border: 1px dashed color-mix(in srgb, currentColor 30%, transparent); }
    .md { line-height: 1.5; overflow-wrap: break-word; }
    .md pre { background: color-mix(in srgb, currentColor 8%, transparent);
              padding: 0.6rem; border-radius: 0.4rem; overflow-x: auto; font-size: 0.82rem; }
    .md code { background: color-mix(in srgb, currentColor 8%, transparent);
               border-radius: 0.2rem; padding: 0 0.2rem; }
    .md pre code { background: none; padding: 0; }
    .md p:first-child { margin-top: 0.2rem; }
    .md p:last-child { margin-bottom: 0.2rem; }
    .plotly-fig { max-width: 42rem; min-height: 20rem; }
    .table-wrap { max-width: 42rem; overflow-x: auto; font-size: 0.8rem; }
    .table-wrap table { border-collapse: collapse; }
    .table-wrap th, .table-wrap td { padding: 0.25rem 0.6rem; text-align: left;
      border-bottom: 1px solid color-mix(in srgb, currentColor 15%, transparent); }
    .table-wrap th { border-bottom-width: 2px; }
    .html-art { width: min(42rem, 100%); height: 18rem; border: 1px solid
                color-mix(in srgb, currentColor 20%, transparent); border-radius: 0.5rem;
                background: white; }
    .json-art pre { font-size: 0.75rem; background: color-mix(in srgb, currentColor 8%, transparent);
                    padding: 0.5rem; border-radius: 0.4rem; max-height: 18rem; overflow: auto; }
    .json-art summary { font-size: 0.75rem; opacity: 0.6; cursor: pointer; }
    .chat-pane { flex: 1; min-width: 0; display: flex; flex-direction: column;
                 border-right: 1px solid color-mix(in srgb, currentColor 20%, transparent); }
    .side-pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .side-bar { display: flex; gap: 0.5rem; align-items: center; padding: 0.4rem 0.75rem;
                border-bottom: 1px solid color-mix(in srgb, currentColor 20%, transparent);
                font-size: 0.85rem; }
    .side-bar .grow { flex: 1; }
    .side-bar a { font-size: 0.8rem; }
    iframe { flex: 1; border: 0; width: 100%; background: white; }
    .log { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .msg { max-width: 52rem; white-space: pre-wrap; line-height: 1.45; overflow-wrap: break-word; }
    .msg.user { align-self: flex-end; background: color-mix(in srgb, currentColor 10%, transparent);
                padding: 0.5rem 0.8rem; border-radius: 0.8rem; }
    .tool { font-size: 0.8rem; font-family: ui-monospace, monospace; opacity: 0.65;
            border-left: 2px solid color-mix(in srgb, currentColor 35%, transparent); padding-left: 0.6rem; }
    .tool pre { white-space: pre-wrap; overflow-wrap: break-word; }
    .error { color: #c0392b; }
    form { display: flex; gap: 0.5rem; padding: 0.75rem 1rem; border-top: 1px solid color-mix(in srgb, currentColor 20%, transparent); }
    textarea { flex: 1; resize: none; font: inherit; padding: 0.5rem; border-radius: 0.5rem; }
    button { font: inherit; padding: 0.4rem 0.9rem; border-radius: 0.5rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: wait; }
    button.small { font-size: 0.8rem; padding: 0.2rem 0.6rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
