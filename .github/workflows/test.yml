name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # The python matrix: no browser, no node — test_e2e skips cleanly
  # without playwright, so this stays fast. pip ignores [tool.uv.sources],
  # so nontainer resolves from PyPI here — CI tests the studio against
  # the RELEASED core, which is what a fresh install gets.
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      run: |
        pytest tests/ -v

    - name: Run linter
      run: |
        ruff check nontainer_studio/ tests/

    - name: Check formatting
      run: |
        ruff format --check nontainer_studio/ tests/

  # The browser E2E runs against the COMMITTED bundle (no npm build
  # here, deliberately): it's what ships, so it's what gets tested.
  e2e:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Install Playwright browser
      run: python -m playwright install --with-deps chromium

    - name: Run browser E2E against the committed bundle
      run: |
        pytest tests/test_e2e.py -v

  # The frontend is committed as a built bundle, so "forgot to rebuild"
  # is this repo's standing footgun: the source says one thing and the
  # served app another. Rebuilding and diffing catches exactly that.
  #
  # This leans on vite output being reproducible: `npm ci` pins every
  # dependency, so the same source builds the same bytes. If this step
  # ever fails on a diff you can't explain locally, suspect TOOLCHAIN
  # drift (node major here vs. yours) before suspecting a stale commit.
  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Build the frontend
      run: npm ci && npm run build
      working-directory: frontend

    - name: The committed bundle matches the source
      run: |
        git diff --exit-code --stat nontainer_studio/static/ || {
          echo "::error::The committed bundle does not match a fresh build."
          echo "Usually: someone changed frontend/src and forgot to run"
          echo "  cd frontend && npm run build"
          echo "If a local rebuild produces NO diff, this is toolchain drift"
          echo "instead — align node-version here with yours (\`node -v\`)."
          exit 1
        }
